version: 1.0.0
name: AgenticMemory
default_agent: agentic-memory

core_agents:
  - memory
  - planner
  - coder
  - auditor
  - security
  - backend-coder
  - frontend-coder
  - test-coder
  - devops-coder
  - security-auditor
  - performance-auditor
  - style-auditor
  - git-manager
  - docs-manager

core_skills:
  - planner
  - coder
  - auditor
  - memory
  - security

features:
  - relationship-memory

paths:
  opencode_config: ~/.config/opencode
  opencode_agents: ~/.config/opencode/agents
  opencode_skills: ~/.config/opencode/skills

install:
  copy_core_agents: true
  copy_core_skills: true
  copy_primary_agent: true

update:
  preserve_user_agents: true
  preserve_user_skills: true
  update_core: true
